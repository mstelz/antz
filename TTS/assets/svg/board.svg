<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#213723"/>
      <stop offset="55%" stop-color="#35573a"/>
      <stop offset="100%" stop-color="#1b2d20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#456a3f" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#456a3f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d0bb86"/>
      <stop offset="100%" stop-color="#f2e0b4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#112015" flood-opacity="0.36"/>
    </filter>
    <pattern id="grain" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="30" r="3" fill="#ffffff" fill-opacity="0.05"/>
      <circle cx="120" cy="58" r="2" fill="#ffffff" fill-opacity="0.04"/>
      <circle cx="68" cy="108" r="2.5" fill="#000000" fill-opacity="0.08"/>
      <path d="M8 130c20-12 46-16 72-10" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>
      <path d="M96 136c16-10 34-14 56-10" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="2400" height="1400" fill="url(#bg)"/>
  <rect width="2400" height="1400" fill="url(#grain)"/>
  <rect x="28" y="28" width="2344" height="1344" rx="32" fill="none" stroke="#d7bf86" stroke-width="10"/>
  <ellipse cx="1200" cy="720" rx="960" ry="500" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="72" width="640" height="170" rx="26" fill="#18261a" fill-opacity="0.7" stroke="#d7bf86" stroke-width="4"/>
    <text x="112" y="148" fill="#f8edd0" font-size="64" font-family="Trebuchet MS" font-weight="700">ANTZ</text>
    <text x="332" y="148" fill="#f8edd0" font-size="40" font-family="Georgia">Backyard Routes</text>
    <text x="112" y="196" fill="#dce7c7" font-size="26" font-family="Georgia">Push workers outward for stronger foraging, then survive the walk home.</text>
  </g>

  <g stroke="url(#trail)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.95" filter="url(#shadow)">
    <path d="M 1200 760 L 1400 700 L 1620 620 L 1872 560"/>
    <path d="M 1200 760 L 1296 602 L 1348 430"/>
    <path d="M 1200 760 L 970 688 L 744 620"/>
    <path d="M 1200 760 L 1412 826 L 1642 904 L 1886 986"/>
    <path d="M 1200 760 L 990 862 L 720 1022"/>
  </g>

  <g fill="#18261a" fill-opacity="0.36">
    <ellipse cx="1868" cy="560" rx="180" ry="92"/>
    <ellipse cx="1348" cy="430" rx="156" ry="86"/>
    <ellipse cx="742" cy="622" rx="168" ry="90"/>
    <ellipse cx="1888" cy="988" rx="178" ry="92"/>
    <ellipse cx="720" cy="1020" rx="190" ry="98"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1200" cy="760" r="146" fill="#2d2517" stroke="#e2c06f" stroke-width="12"/>
    <circle cx="1200" cy="760" r="116" fill="#c89c42" stroke="#f4ddab" stroke-width="8"/>
    <text x="1200" y="742" text-anchor="middle" fill="#fff8ea" font-size="62" font-family="Trebuchet MS" font-weight="700">Nest</text>
    <text x="1200" y="798" text-anchor="middle" fill="#fff1d0" font-size="28" font-family="Georgia">Launch point and safe return</text>
  </g>

  <g font-family="Trebuchet MS" font-weight="700" text-anchor="middle" filter="url(#shadow)">
    <circle cx="1400" cy="700" r="52" fill="#8d6346" stroke="#f4ddab" stroke-width="6"/><text x="1400" y="716" fill="#fff7eb" font-size="38">1</text>
    <circle cx="1620" cy="620" r="52" fill="#8d6346" stroke="#f4ddab" stroke-width="6"/><text x="1620" y="636" fill="#fff7eb" font-size="38">2</text>
    <circle cx="1296" cy="602" r="52" fill="#5c8a47" stroke="#d8efc1" stroke-width="6"/><text x="1296" y="618" fill="#fff7eb" font-size="38">1</text>
    <circle cx="970" cy="688" r="52" fill="#7b6141" stroke="#e8d5b5" stroke-width="6"/><text x="970" y="704" fill="#fff7eb" font-size="38">1</text>
    <circle cx="1412" cy="826" r="52" fill="#587f99" stroke="#d4ebf5" stroke-width="6"/><text x="1412" y="842" fill="#fff7eb" font-size="38">1</text>
    <circle cx="1642" cy="904" r="52" fill="#587f99" stroke="#d4ebf5" stroke-width="6"/><text x="1642" y="920" fill="#fff7eb" font-size="38">2</text>
    <circle cx="990" cy="862" r="52" fill="#b45e4d" stroke="#f3d7cf" stroke-width="6"/><text x="990" y="878" fill="#fff7eb" font-size="38">1</text>
  </g>

  <g font-family="Trebuchet MS" font-weight="700" filter="url(#shadow)">
    <g transform="translate(1704 488)">
      <rect width="448" height="140" rx="22" fill="#91583b" stroke="#f0deba" stroke-width="5"/>
      <text x="34" y="64" fill="#fff2de" font-size="48">Flower Bed</text>
      <text x="34" y="104" fill="#fff2de" font-size="24" font-family="Georgia">Best food, longest exposed branch</text>
    </g>

    <g transform="translate(1088 336)">
      <rect width="334" height="132" rx="22" fill="#5c8947" stroke="#d8efc1" stroke-width="5"/>
      <text x="30" y="62" fill="#f6fbe8" font-size="44">Grass Patch</text>
      <text x="30" y="100" fill="#f6fbe8" font-size="24" font-family="Georgia">Steady forage with lighter risk</text>
    </g>

    <g transform="translate(404 552)">
      <rect width="392" height="132" rx="22" fill="#6e4d32" stroke="#e8d4b2" stroke-width="5"/>
      <text x="30" y="62" fill="#fff3df" font-size="44">Compost Heap</text>
      <text x="30" y="100" fill="#fff3df" font-size="24" font-family="Georgia">Mud, scraps, and building material</text>
    </g>

    <g transform="translate(1698 918)">
      <rect width="430" height="132" rx="22" fill="#5b88a4" stroke="#d4ebf5" stroke-width="5"/>
      <text x="30" y="62" fill="#eef8ff" font-size="44">Bird Bath</text>
      <text x="30" y="100" fill="#eef8ff" font-size="24" font-family="Georgia">Water payoff with flood pressure</text>
    </g>

    <g transform="translate(312 954)">
      <rect width="420" height="132" rx="22" fill="#b16251" stroke="#f3d7cf" stroke-width="5"/>
      <text x="30" y="62" fill="#fff4ef" font-size="44">Predator Lane</text>
      <text x="30" y="100" fill="#fff4ef" font-size="24" font-family="Georgia">Conflict route for threat and reward</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1730" y="84" width="566" height="188" rx="24" fill="#18261a" fill-opacity="0.72" stroke="#d7bf86" stroke-width="4"/>
    <text x="1772" y="144" fill="#f7edd0" font-size="34" font-family="Trebuchet MS" font-weight="700">Route Guide</text>
    <text x="1772" y="190" fill="#dce7c7" font-size="26" font-family="Georgia">Numbered circles mark travel cost.</text>
    <text x="1772" y="226" fill="#dce7c7" font-size="26" font-family="Georgia">Outer spaces pay better, but events punish exposed ants.</text>
  </g>

  <text x="92" y="1310" fill="#dce7c7" font-size="26" font-family="Georgia">Use the outer labels as destination snap areas and the numbered circles as cost reminders while rules are still changing.</text>
</svg>
